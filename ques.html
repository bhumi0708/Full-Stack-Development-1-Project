<!DOCTYPE html>
<html>
<head>
<title>Previous Year Question Papers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    font-family:"Segoe UI", sans-serif;
    background:linear-gradient(135deg,#c3cfe2,#f5f7fa);
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:60%;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:40px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
    margin-bottom:30px;
    color:#3b3bb3;
    letter-spacing:2px;
    font-size:30px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th{
    background:linear-gradient(90deg,#4CAF50,#7ed957);
    color:white;
    padding:15px;
    font-size:18px;
}
td{
    padding:14px;
    text-align:center;
    font-size:17px;
    border-bottom:1px solid #ddd;
}
tr:nth-child(even){
    background:#f3f6ff;
}
tr:hover{
    background:#e6ecff;
    transition:0.3s;
}
a{
    text-decoration:none;
    padding:8px 18px;
    border-radius:20px;
    background:linear-gradient(45deg,#2196F3,#00c6ff);
    color:white;
    font-weight:bold;
    transition:0.3s;
}
a:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
.container{
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

<h2>Previous Year Question Papers</h2>

<table>

<tr>
<th>YEAR</th>
<th>LINKS</th>
</tr>

</tr>

<tr>

</tr>

<tr>

</tr>

</table>

</div>



</body>
</html>
